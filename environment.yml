name: rnaseq2tracks
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ── Alignment & processing ────────────────────────────────────────────────
  - star>=2.7.10
  - samtools>=1.17
  - bedtools>=2.31
  # ── QC ───────────────────────────────────────────────────────────────────
  - fastqc>=0.12
  - trim-galore>=0.6.10
  - multiqc>=1.19
  - rseqc>=5.0.1
  # ── R base ───────────────────────────────────────────────────────────────
  - r-base>=4.3
  # ── Bioconductor ─────────────────────────────────────────────────────────
  - bioconductor-deseq2>=1.42
  - bioconductor-apeglm>=1.24
  - bioconductor-rsamtools>=2.18
  - bioconductor-genomicalignments>=1.38
  - bioconductor-rtracklayer>=1.62
  - bioconductor-genomicfeatures>=1.54
  - bioconductor-genomicranges>=1.54
  - bioconductor-vsn>=3.70
  # ── CRAN ─────────────────────────────────────────────────────────────────
  - r-pheatmap>=1.0.12
  - r-rcolorbrewer>=1.1
  - r-ggplot2>=3.4
  - r-ggrepel>=0.9
  - r-data.table>=1.14
  - r-optparse>=1.7
  - r-knitr>=1.45
  - r-kableextra>=1.3
  - r-rmarkdown>=2.25
  - r-r.utils>=2.12        # required by bam_to_bedgraph.R (gzip output)
  # ── Report rendering ──────────────────────────────────────────────────────
  - pandoc
