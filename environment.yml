name: rnaseq2tracks
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ── Alignment & processing ────────────────────────────────────────────────
  - star>=2.7.10
  - samtools>=1.17
  - bedtools>=2.31
  # ── QC ───────────────────────────────────────────────────────────────────
  - fastqc>=0.12
  - trim-galore>=0.6.10
  - multiqc>=1.19
  - rseqc>=5.0.1
  # ── R base ───────────────────────────────────────────────────────────────
  - r-base>=4.3
  # ── Bioconductor ─────────────────────────────────────────────────────────
  - bioconductor-deseq2>=1.42
  - bioconductor-apeglm>=1.24
  - bioconductor-txdbmaker>=1.0         # makeTxDbFromGFF, split from GenomicFeatures 3.18
  - bioconductor-rsamtools>=2.18
  - bioconductor-genomicalignments>=1.38
  - bioconductor-rtracklayer>=1.62
  - bioconductor-genomicfeatures>=1.54
  - bioconductor-genomicranges>=1.54
  - bioconductor-vsn>=3.70
  - bioconductor-clusterprofiler>=4.10  # ORA and GSEA (GO, KEGG)
  - bioconductor-enrichplot>=1.22       # enrichment visualizations
  - bioconductor-reactomepa>=1.46       # Reactome ORA and GSEA
  - bioconductor-fgsea>=1.28            # MSigDB Hallmarks GSEA
  - bioconductor-org.mm.eg.db>=3.18     # mouse gene annotation (Entrez mapping)
  - bioconductor-org.hs.eg.db>=3.18     # human gene annotation (Entrez mapping)
  # ── CRAN ─────────────────────────────────────────────────────────────────
  - r-pheatmap>=1.0.12
  - r-rcolorbrewer>=1.1
  - r-ggplot2>=3.4
  - r-ggrepel>=0.9
  - r-ashr>=2.2                         # lfcShrink fallback in deseq2_de.R
  - r-data.table>=1.14
  - r-optparse>=1.7
  - r-knitr>=1.45
  - r-kableextra>=1.3
  - r-rmarkdown>=2.25
  - r-r.utils>=2.12                     # required by bam_to_bedgraph.R (gzip output)
  - r-msigdbr>=7.5                      # MSigDB gene sets (mouse + human, offline)
  # ── Report rendering ──────────────────────────────────────────────────────
  - pandoc
