# =============================================================================
# rnaseq2tracks v4 — configuration template
# Copy to config/config.conf, fill ALL values, add to .gitignore
# =============================================================================

# ── Species ──────────────────────────────────────────────────────────────────
SPECIES="human"             # human | mouse
GENOME_ASSEMBLY="hg38"      # hg38, mm39, etc.

# ── Human genome paths ───────────────────────────────────────────────────────
STAR_INDEX_HUMAN="/home/micgdu/GenomicData/genomicIndices/hsapiens/STAR/STAR-2.7.11b_GRCh38_150bp"
GTF_HUMAN="/home/micgdu/GenomicData/genomesDec2022/gencode.v42.primary_assembly.annotation.gtf"
CHROM_SIZES_HUMAN="/home/micgdu/GenomicData/genomesDec2022/hs38n.chrom.sizes"

# ── Mouse genome paths ───────────────────────────────────────────────────────
STAR_INDEX_MOUSE="/home/micgdu/GenomicData/genomicIndices/hsapiens/STAR/STAR-2.7.11b_GRCm39_150bp"
GTF_MOUSE="/home/micgdu/GenomicData/genomesDec2022/gencode.vM31.primary_assembly.annotation.gtf"
CHROM_SIZES_MOUSE="/home/micgdu/GenomicData/genomesDec2022/mm39n.chrom.sizes"

# ── RSeQC BED12 annotation ───────────────────────────────────────────────────
# Download from: https://sourceforge.net/projects/rseqc/files/BED/
# Or generate: gtfToGenePred annotation.gtf | genePredToBed stdin annotation.bed
RSEQC_BED_HUMAN="/home/micgdu/GenomicData/genomesDec2022/top1000_proteincoding.bed"
RSEQC_BED_MOUSE="/home/micgdu/GenomicData/genomesDec2022/top1000_mouse_ortholog_proteincoding.bed"

# Directory containing RSeQC executables.
# Leave empty if RSeQC is in PATH (conda install rseqc)
RSEQC_BIN_DIR=""

# ── Strand consistency check ─────────────────────────────────────────────────
# % tolerance for |Fwd+Rev - Total| / Total on stranded samples
STRAND_TOLERANCE_PCT="5"

# ── Kent utils ───────────────────────────────────────────────────────────────
KENTUTILS_DIR="/home/micgdu/kentutils/"            # directory containing bedGraphToBigWig
TMPDIR="/tmp"

# ── Chromosome filter ────────────────────────────────────────────────────────
REGULAR_CHROMS_ONLY="true"  # true | false
CHROMOSOME_NAMING="ucsc"    # ucsc | ensembl

# ── Library ──────────────────────────────────────────────────────────────────
LIBRARY_LAYOUT="PE"         # SE | PE

# ── Input / Output ───────────────────────────────────────────────────────────
SAMPLESHEET="config/samplesheet.csv"
OUTDIR="/home/micgdu/Analysis/Malewicz_LYAR/RNAseqAnalysis/"

# ── Performance ──────────────────────────────────────────────────────────────
MAX_JOBS=8
STAR_THREADS=15
SAMTOOLS_THREADS=4
FASTQC_THREADS=4

# ── Trimming ─────────────────────────────────────────────────────────────────
TRIM_QUALITY=20
TRIM_MIN_LENGTH=20

# ── Tool executables ─────────────────────────────────────────────────────────
FASTQC_BIN="fastqc"
MULTIQC_BIN="multiqc"
RSCRIPT_BIN="Rscript"

# ── Differential expression ──────────────────────────────────────────────────
RUN_DE="true"
CONTRASTS="config/contrasts.csv"
DESIGN_FORMULA="~ condition"
PADJ_THRESHOLD="0.05"
LFC_THRESHOLD="0"

# ── Optional modules ─────────────────────────────────────────────────────────
MERGE_REPLICATES="true"
UCSC_TRACKS="true"
UCSC_BASE_URL="PLACEHOLDER_URL"
RUN_RSEQC="true"            # requires RSEQC_BED_* to be set

# ── FastQ Screen (Step 2b) ────────────────────────────────────────────────────
FASTQSCREEN_CONF="/home/micgdu/Analysis/workflows/rnaseq2tracks_v4/rnaseq2tracksP/config/fastq_screen.conf"
FASTQSCREEN_THREADS=4
FASTQSCREEN_SUBSET=200000
