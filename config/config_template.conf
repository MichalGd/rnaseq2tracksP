# =============================================================================
# rnaseq2tracks v4 — configuration template
# Copy to config/config.conf, fill ALL values, add to .gitignore
# =============================================================================

# ── Species ──────────────────────────────────────────────────────────────────
SPECIES="mouse"             # human | mouse
GENOME_ASSEMBLY="mm39"      # hg38, mm39, etc.

# ── Human genome paths ───────────────────────────────────────────────────────
STAR_INDEX_HUMAN=""
GTF_HUMAN=""
CHROM_SIZES_HUMAN=""

# ── Mouse genome paths ───────────────────────────────────────────────────────
STAR_INDEX_MOUSE=""
GTF_MOUSE=""
CHROM_SIZES_MOUSE=""

# ── RSeQC BED12 annotation ───────────────────────────────────────────────────
# Download from: https://sourceforge.net/projects/rseqc/files/BED/
# Or generate: gtfToGenePred annotation.gtf | genePredToBed stdin annotation.bed
RSEQC_BED_HUMAN=""          # e.g. /path/to/hg38_GENCODE_V45_Comprehensive.bed
RSEQC_BED_MOUSE=""          # e.g. /path/to/mm39_GENCODE_vM31_Comprehensive.bed

# Directory containing RSeQC executables.
# Leave empty if RSeQC is in PATH (conda install rseqc)
RSEQC_BIN_DIR=""

# ── Strand consistency check ─────────────────────────────────────────────────
# % tolerance for |Fwd+Rev - Total| / Total on stranded samples
STRAND_TOLERANCE_PCT="5"

# ── Kent utils ───────────────────────────────────────────────────────────────
KENTUTILS_DIR=""            # directory containing bedGraphToBigWig
TMPDIR="/tmp"

# ── Chromosome filter ────────────────────────────────────────────────────────
REGULAR_CHROMS_ONLY="true"  # true | false
CHROMOSOME_NAMING="ucsc"    # ucsc | ensembl

# ── Library ──────────────────────────────────────────────────────────────────
LIBRARY_LAYOUT="PE"         # SE | PE

# ── Input / Output ───────────────────────────────────────────────────────────
SAMPLESHEET="config/samplesheet.csv"
OUTDIR=""

# ── Performance ──────────────────────────────────────────────────────────────
MAX_JOBS=8
STAR_THREADS=15
SAMTOOLS_THREADS=4
FASTQC_THREADS=4

# ── Trimming ─────────────────────────────────────────────────────────────────
TRIM_QUALITY=20
TRIM_MIN_LENGTH=20

# ── Tool executables ─────────────────────────────────────────────────────────
FASTQC_BIN="fastqc"
MULTIQC_BIN="multiqc"
RSCRIPT_BIN="Rscript"

# ── Differential expression ──────────────────────────────────────────────────
RUN_DE="true"
CONTRASTS="config/contrasts.csv"
DESIGN_FORMULA="~ condition"
# Thresholds for filtering DE results (volcano plots, heatmaps, ORA input)
PADJ_THRESHOLD="0.05"       # adjusted p-value cutoff (Benjamini-Hochberg)
LFC_THRESHOLD="1"           # |log2 fold-change| cutoff
# Thresholds passed directly to DESeq2::results() — independent filtering
DE_PADJ_THRESHOLD="0.05"    # same as PADJ_THRESHOLD unless stricter DE calling needed
DE_LFC_THRESHOLD="1"        # lfcThreshold argument in DESeq2::results()

# ── Gene enrichment analysis ─────────────────────────────────────────────────
ENRICHMENT_MINGS=10         # min gene set size (ORA + GSEA)
ENRICHMENT_MAXGS=500        # max gene set size (ORA + GSEA)

# ── Optional modules ─────────────────────────────────────────────────────────
MERGE_REPLICATES="true"
UCSC_TRACKS="true"
UCSC_BASE_URL=""            # base URL for UCSC track hub, e.g. https://yourserver.pl/tracks
RUN_RSEQC="true"            # requires RSEQC_BED_* to be set

# ── FastQ Screen (Step 2b) ───────────────────────────────────────────────────
# Screens raw FASTQ files for species contamination and mycoplasma before trimming.
# Step 2b is skipped gracefully if fastq_screen is not in PATH or conf is missing.
FASTQSCREEN_CONF="config/fastq_screen.conf"   # path to FastQ Screen database config
FASTQSCREEN_THREADS=4                          # bowtie2 threads per sample
FASTQSCREEN_SUBSET=200000                      # reads sampled per file (0 = all)
