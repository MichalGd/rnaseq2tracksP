# =============================================================================
# rnaseq2tracks v3 — configuration template
# =============================================================================
# Copy to config/config.conf and fill in ALL values before running.
# config/config.conf is excluded from git (.gitignore).

# ─── Species selection ────────────────────────────────────────────────────────
# Set SPECIES to "human" or "mouse".
# The master script will automatically select the corresponding STAR index,
# GTF, and chrom.sizes from the species-specific paths below.
SPECIES="mouse"             # human | mouse
GENOME_ASSEMBLY="mm39"      # e.g. hg38, mm39  (used for Seqinfo in R merge step)

# ─── Human genome paths ───────────────────────────────────────────────────────
STAR_INDEX_HUMAN=""         # e.g. /data/genomes/hg38/STAR_index_149bp
GTF_HUMAN=""                # e.g. /data/genomes/hg38/gencode.v45.annotation.gtf.gz
CHROM_SIZES_HUMAN=""        # e.g. /data/genomes/hg38/hg38.chrom.sizes

# ─── Mouse genome paths ───────────────────────────────────────────────────────
STAR_INDEX_MOUSE=""         # e.g. /data/genomes/mm39/STAR_index_149bp
GTF_MOUSE=""                # e.g. /data/genomes/mm39/gencode.vM31.annotation.gtf.gz
CHROM_SIZES_MOUSE=""        # e.g. /data/genomes/mm39/mm39.chrom.sizes

# ─── Tool paths ───────────────────────────────────────────────────────────────
KENTUTILS_DIR=""            # directory containing bedGraphToBigWig binary
TMPDIR="/tmp"               # fast local temp for STAR

# ─── Chromosome filtering for UCSC-compatible BigWigs ─────────────────────────
# true  → keep only regular chromosomes before BigWig conversion (recommended)
# false → keep all chromosomes/scaffolds (useful for non-standard genomes)
REGULAR_CHROMS_ONLY="true"

# ucsc     → chr1, chr2, …, chrX, chrY, chrM
# ensembl  → 1, 2, …, X, Y, MT
CHROMOSOME_NAMING="ucsc"

# ─── Library ──────────────────────────────────────────────────────────────────
LIBRARY_LAYOUT="PE"         # SE | PE

# ─── Input / Output ───────────────────────────────────────────────────────────
SAMPLESHEET="config/samplesheet.csv"
OUTDIR=""                   # All outputs written here (never inside the repo)

# ─── Performance ──────────────────────────────────────────────────────────────
MAX_JOBS=8
STAR_THREADS=15
SAMTOOLS_THREADS=4
FASTQC_THREADS=4

# ─── Trimming ─────────────────────────────────────────────────────────────────
TRIM_QUALITY=20
TRIM_MIN_LENGTH=20

# ─── Tool executables (leave blank to use PATH) ───────────────────────────────
FASTQC_BIN="fastqc"
MULTIQC_BIN="multiqc"
RSCRIPT_BIN="Rscript"

# ─── Differential expression ──────────────────────────────────────────────────
RUN_DE="true"
CONTRASTS="config/contrasts.csv"
DESIGN_FORMULA="~ condition"
PADJ_THRESHOLD="0.05"
LFC_THRESHOLD="1"

# ─── Tracks ───────────────────────────────────────────────────────────────────
MERGE_REPLICATES="true"
UCSC_TRACKS="true"
UCSC_BASE_URL="PLACEHOLDER_URL"  # HTTP(S) URL hosting your BigWig files
